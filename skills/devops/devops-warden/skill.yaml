anti_patterns:
  - pattern: 'Running `composer install` or `bin/magento setup:upgrade` on the host machine'
    problem: 'The host PHP binary and extensions almost never match the container. Composer resolves platform requirements against the wrong PHP version, writes an incompatible composer.lock, and Magento setup writes generated code (generated/code, generated/metadata) built for the host toolchain. The app then fails to boot inside the container with cryptic class-loading errors.'
    solution: 'Always `warden shell` first. Run composer, bin/magento, and any php script from inside the php-fpm container so the toolchain, extensions, and file ownership match what the running application sees.'

  - pattern: 'Copying a SQL dump into the db container with `docker cp` before importing'
    problem: 'Large dumps balloon the container filesystem, slow down disk I/O for the live DB, and leave orphan files that are easy to forget. The copy step also doubles the time to import.'
    solution: 'Stream directly: `pv dump.sql.gz | gunzip -c | warden db import`. Nothing is written to disk inside the container, and `pv` reports throughput so you know the import is making progress.'

  - pattern: 'Restarting containers to clear caches'
    problem: 'Container restarts drop all in-memory state (Redis keys, Varnish objects, OPcache), break active debugging sessions, and take far longer than targeted cache operations. They also mask real bugs by forcing a cold-start that hides stale-config issues.'
    solution: 'Use the targeted tool: `warden redis flushall` for Redis, `warden valkey flushall` for Valkey, the varnishadm ban for Varnish, and `bin/magento cache:flush` for Magento-managed caches. Restart only when a service is actually unhealthy.'

  - pattern: 'Debugging silent failures without checking `warden doctor`'
    problem: "Warden depends on Docker, mutagen, DNS resolution, and traefik routing. When one piece drifts (expired certs, stale resolver, Docker Desktop update), commands fail in confusing ways — `warden shell` hangs, URLs 502, or env vars don't load. Hours get spent chasing application-layer causes for an environment-layer problem."
    solution: 'Run `warden doctor` (or `warden doctor -v` for environment variables) at the first sign of unexplained environment behavior. It reports Docker state, DNS resolver config, root certificate trust, and mutagen session health in one pass.'

